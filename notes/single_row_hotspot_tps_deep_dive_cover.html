<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1440px;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    color: #fff;
    display: flex; flex-direction: column;
    padding: 80px 70px;
  }
  .badge {
    display: inline-block; align-self: flex-start;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 20px;
    padding: 8px 24px; font-size: 24px;
    letter-spacing: 2px; margin-bottom: 40px;
  }
  .title { font-size: 70px; font-weight: 800; line-height: 1.25; margin-bottom: 18px; }
  .title .highlight { color: #e94560; }
  .subtitle { font-size: 30px; color: rgba(255,255,255,0.7); margin-bottom: 50px; }
  .points { flex: 1; display: flex; flex-direction: column; gap: 22px; }
  .point {
    display: flex; align-items: center; gap: 24px;
    background: rgba(255,255,255,0.08);
    border-radius: 20px; padding: 26px 34px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .point-num {
    width: 54px; height: 54px; border-radius: 14px;
    background: linear-gradient(135deg, #e94560, #c23152);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 700; flex-shrink: 0;
  }
  .point-text { font-size: 33px; font-weight: 600; }
  .point-desc { font-size: 25px; color: rgba(255,255,255,0.6); margin-top: 4px; font-weight: 400; }
  .footer {
    margin-top: 40px; display: flex; align-items: center;
    justify-content: space-between; padding-top: 28px;
    border-top: 1px solid rgba(255,255,255,0.15);
  }
  .source { font-size: 24px; color: rgba(255,255,255,0.5); }
  .tag {
    background: rgba(233,69,96,0.3); border: 1px solid rgba(233,69,96,0.5);
    border-radius: 12px; padding: 6px 18px; font-size: 22px; color: #e94560;
  }
</style>
</head>
<body>
  <div class="badge">后端 · 高并发</div>
  <div class="title">单行热点为什么<br><span class="highlight">TPS 不是 1</span></div>
  <div class="subtitle">从 TPS/RT 真相,到分桶与库存扣减落地</div>
  <div class="points">
    <div class="point">
      <div class="point-num">1</div>
      <div>
        <div class="point-text">串行 ≠ TPS=1</div>
        <div class="point-desc">TPS ≈ 1/RT,持锁50µs就是2万,不是1</div>
      </div>
    </div>
    <div class="point">
      <div class="point-num">2</div>
      <div>
        <div class="point-text">加并发不一定提 TPS</div>
        <div class="point-desc">瓶颈打满就封顶,加并发只是堆队列</div>
      </div>
    </div>
    <div class="point">
      <div class="point-num">3</div>
      <div>
        <div class="point-text">真正的危害是 RT 线性涨</div>
        <div class="point-desc">Little 定律:并发 = TPS × RT</div>
      </div>
    </div>
    <div class="point">
      <div class="point-num">4</div>
      <div>
        <div class="point-text">拆分突破天花板</div>
        <div class="point-desc">但瓶颈只会转移,不会消失</div>
      </div>
    </div>
    <div class="point">
      <div class="point-num">5</div>
      <div>
        <div class="point-text">拆完要借库存 + 对账</div>
        <div class="point-desc">否则库存倾斜导致少卖</div>
      </div>
    </div>
  </div>
  <div class="footer">
    <div class="source">学习笔记 · 手写 Go demo 实测</div>
    <div class="tags"><span class="tag">#高并发</span></div>
  </div>
</body>
</html>
