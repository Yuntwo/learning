<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, initial-scale=1.0" />
  <title>Claude Code Skill 命中机制</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 1080px;
      height: 1440px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      color: #f5f7fb;
      background:
        radial-gradient(circle at 15% 20%, rgba(88, 166, 255, 0.28), transparent 28%),
        radial-gradient(circle at 85% 18%, rgba(122, 92, 255, 0.24), transparent 30%),
        radial-gradient(circle at 50% 82%, rgba(0, 214, 201, 0.14), transparent 32%),
        linear-gradient(180deg, #07111f 0%, #0a1526 45%, #0d1020 100%);
      overflow: hidden;
    }
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 54px 54px;
      mask-image: linear-gradient(180deg, rgba(0,0,0,0.85), rgba(0,0,0,0.2));
    }
    .wrap {
      position: relative;
      padding: 96px 72px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .badge {
      display: inline-block;
      padding: 14px 22px;
      border: 1px solid rgba(120, 196, 255, 0.35);
      border-radius: 999px;
      background: rgba(10, 18, 36, 0.55);
      color: #89d4ff;
      font-size: 24px;
      letter-spacing: 0.08em;
      backdrop-filter: blur(10px);
    }
    h1 {
      margin: 28px 0 18px;
      font-size: 82px;
      line-height: 1.08;
      letter-spacing: -0.03em;
      width: 900px;
    }
    .subtitle {
      width: 860px;
      margin: 0;
      color: rgba(235, 241, 255, 0.82);
      font-size: 32px;
      line-height: 1.5;
    }
    .cards {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      margin-top: 48px;
    }
    .card {
      padding: 28px 30px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(21, 31, 58, 0.78), rgba(12, 19, 38, 0.9));
      border: 1px solid rgba(146, 191, 255, 0.18);
      box-shadow: 0 14px 38px rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(14px);
    }
    .card-title {
      font-size: 26px;
      color: #8fd7ff;
      margin-bottom: 10px;
      font-weight: 700;
    }
    .card-text {
      font-size: 34px;
      line-height: 1.42;
      color: #f6f8ff;
      font-weight: 600;
    }
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: rgba(226, 232, 255, 0.72);
      font-size: 26px;
    }
    .footer strong {
      color: #ffffff;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="grid"></div>
  <div class="wrap">
    <div>
      <div class="badge">AI 工程 · Skill 路由</div>
      <h1>Claude Code 的 skill 到底是怎么命中的？</h1>
      <p class="subtitle">从一次 messages 抓包里，能看到的不是“黑盒自动路由”，而更像是：运行时先注入技能注册表，再由模型在 prompt 中做选择。</p>

      <div class="cards">
        <div class="card">
          <div class="card-title">关键观察 01</div>
          <div class="card-text">可用 skills 列表会直接进入 system 上下文</div>
        </div>
        <div class="card">
          <div class="card-title">关键观察 02</div>
          <div class="card-text">description 和触发词，本身就是模型的路由依据</div>
        </div>
        <div class="card">
          <div class="card-title">关键观察 03</div>
          <div class="card-text">“知道 skill 存在” 和 “真正调用 skill” 是两件事</div>
        </div>
        <div class="card">
          <div class="card-title">一句话结论</div>
          <div class="card-text">先注入能力目录，再让模型完成识别与选择</div>
        </div>
      </div>
    </div>

    <div class="footer">
      <span>适合收藏的 AI 工程观察</span>
      <span><strong>Prompt ≈ 路由协议</strong></span>
    </div>
  </div>
</body>
</html>
