<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1440px;
    background: radial-gradient(circle at top left, rgba(86, 105, 255, 0.35), transparent 35%),
                linear-gradient(135deg, #0f172a 0%, #111827 45%, #1e293b 100%);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    color: #fff;
    display: flex; flex-direction: column;
    padding: 78px 72px;
  }
  .badge {
    display: inline-block; align-self: flex-start;
    background: rgba(255,255,255,0.10);
    border: 1px solid rgba(255,255,255,0.22);
    border-radius: 999px;
    padding: 10px 24px;
    font-size: 24px;
    letter-spacing: 2px;
    color: #cbd5e1;
    margin-bottom: 36px;
  }
  .title {
    font-size: 72px;
    font-weight: 800;
    line-height: 1.18;
    margin-bottom: 18px;
  }
  .title .highlight { color: #60a5fa; }
  .subtitle {
    font-size: 31px;
    line-height: 1.5;
    color: rgba(255,255,255,0.72);
    margin-bottom: 52px;
  }
  .points {
    display: flex;
    flex-direction: column;
    gap: 24px;
    flex: 1;
  }
  .point {
    display: flex;
    gap: 22px;
    padding: 28px 30px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 24px;
    backdrop-filter: blur(8px);
  }
  .num {
    width: 54px; height: 54px;
    border-radius: 16px;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 800;
    flex-shrink: 0;
  }
  .point-title {
    font-size: 34px;
    font-weight: 700;
    line-height: 1.3;
  }
  .point-desc {
    margin-top: 6px;
    font-size: 24px;
    line-height: 1.5;
    color: rgba(255,255,255,0.62);
  }
  .footer {
    margin-top: 42px;
    padding-top: 26px;
    border-top: 1px solid rgba(255,255,255,0.14);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .source {
    font-size: 24px;
    color: rgba(255,255,255,0.48);
  }
  .tag {
    display: inline-block;
    padding: 8px 16px;
    border-radius: 14px;
    border: 1px solid rgba(96,165,250,0.4);
    background: rgba(96,165,250,0.16);
    color: #93c5fd;
    font-size: 22px;
  }
</style>
</head>
<body>
  <div class="badge">AI 学习导航</div>
  <div class="title">这份 <span class="highlight">WaytoAGI</span><br>到底整理了什么？</div>
  <div class="subtitle">不是单篇教程，而是一张覆盖学习、工具、研究与商业化的 AI 知识地图</div>

  <div class="points">
    <div class="point">
      <div class="num">1</div>
      <div>
        <div class="point-title">入门与学习路径</div>
        <div class="point-desc">从启程指引、课程到训练营，先帮你建立 AI 全景认知。</div>
      </div>
    </div>

    <div class="point">
      <div class="num">2</div>
      <div>
        <div class="point-title">Prompt 与 Agents</div>
        <div class="point-desc">把大模型使用方法、智能体实践放在核心入口位置。</div>
      </div>
    </div>

    <div class="point">
      <div class="num">3</div>
      <div>
        <div class="point-title">多模态创作工具链</div>
        <div class="point-desc">覆盖绘画、视频、音乐、数字人、3D 和 ComfyUI 工作流。</div>
      </div>
    </div>

    <div class="point">
      <div class="num">4</div>
      <div>
        <div class="point-title">AI 编程 + 研究资料</div>
        <div class="point-desc">既有开发落地，也有研究报告、论文、数据和投融资线索。</div>
      </div>
    </div>

    <div class="point">
      <div class="num">5</div>
      <div>
        <div class="point-title">产业趋势与商业化</div>
        <div class="point-desc">新闻周刊、法规、组队招聘、行业方案，补齐现实世界视角。</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="source">学习笔记 · AI 资源全景图</div>
    <div class="tag">#AI学习</div>
  </div>
</body>
</html>
